spring:
  datasource:
    url: jdbc:h2:mem:user-service-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    hikari:
      schema: user_service
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: user_service
    drop-first: true

jwt:
  secret: test-secret-key-for-user-service-jwt-256-bit
  access-expiration: 5m
  refresh-expiration: 30d
