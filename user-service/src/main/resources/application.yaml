spring:
  application:
    name: user-service
  datasource:
    url: ${USER_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/privalov-db}
    username: ${USER_SERVICE_DB_USERNAME:admin}
    password: ${USER_SERVICE_DB_PASSWORD:postgres}
    hikari:
      schema: user_service
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: user_service
    drop-first: false
    test-rollback-on-update: false

server:
  port: ${USER_SERVICE_PORT:8081}

#eureka:
#  client:
#    service-url:
#      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
#  instance:
#    prefer-ip-address: true
#    instance-id: ${spring.application.name}:${random.uuid}

jwt:
  secret: ${USER_SERVICE_JWT_SECRET:local-dev-secret-key-for-user-service-jwt-256-bit}
  access-expiration: ${USER_SERVICE_JWT_ACCESS_EXPIRATION:5m}
  refresh-expiration: ${USER_SERVICE_JWT_REFRESH_EXPIRATION:30d}

logging:
  level:
    ru.privalov: debug
