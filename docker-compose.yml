services:
  postgres:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: privalov-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d privalov-db"]
      interval: 5s
      timeout: 5s
      retries: 10

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: discovery-server
    image: messaging-service/discovery-server:local
    restart: unless-stopped
    environment:
      DISCOVERY_SERVER_PORT: 8761
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway
    image: messaging-service/api-gateway:local
    restart: unless-stopped
    depends_on:
      - discovery-server
    environment:
      API_GATEWAY_PORT: 8080
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8080:8080"

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: user-service
    image: messaging-service/user-service:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
    environment:
      USER_SERVICE_PORT: 8080
      USER_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/privalov-db
      USER_SERVICE_DB_USERNAME: admin
      USER_SERVICE_DB_PASSWORD: postgres
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
    deploy:
      replicas: 3

volumes:
  postgres_data:
