services:
  postgres:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: privalov-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d privalov-db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.3.2-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: discovery-server
    image: messaging-service/discovery-server:local
    restart: unless-stopped
    environment:
      DISCOVERY_SERVER_PORT: 8761
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway
    image: messaging-service/api-gateway:local
    restart: unless-stopped
    depends_on:
      - discovery-server
    environment:
      API_GATEWAY_PORT: 8080
      API_GATEWAY_JWT_SECRET: local-dev-secret-key-for-user-service-jwt-256-bit
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8080:8080"

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: user-service
    image: messaging-service/user-service:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
    environment:
      USER_SERVICE_PORT: 8080
      USER_SERVICE_DB_URL: jdbc:postgresql://postgres:5432/privalov-db
      USER_SERVICE_DB_USERNAME: admin
      USER_SERVICE_DB_PASSWORD: postgres
      USER_SERVICE_JWT_SECRET: local-dev-secret-key-for-user-service-jwt-256-bit
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
    deploy:
      replicas: 2

  connection-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: connection-service
    image: messaging-service/connection-service:local
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    environment:
      CONNECTION_SERVICE_PORT: 8080
      CONNECTION_SERVICE_REDIS_HOST: redis
      CONNECTION_SERVICE_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
    deploy:
      replicas: 2

  mess-history:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: mess-history
    image: messaging-service/mess-history:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    environment:
      MESS_HISTORY_PORT: 8080
      MESS_HISTORY_DB_URL: jdbc:postgresql://postgres:5432/privalov-db
      MESS_HISTORY_DB_USERNAME: admin
      MESS_HISTORY_DB_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
    deploy:
      replicas: 2

  mess-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: mess-service
    image: messaging-service/mess-service:local
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      connection-service:
        condition: service_started
      mess-history:
        condition: service_started
      discovery-server:
        condition: service_started
    environment:
      MESS_SERVICE_PORT: 8080
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka/
    deploy:
      replicas: 2

volumes:
  postgres_data:
